<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Fale Conosco</title>
  <link rel="stylesheet" href="/html-basico/Laboratorio-das-aulas-de-Front-End-TADS/html-basico/css/formsstyle.css">
</head>
<body>

<div class="container">
  <h2>Fale Conosco</h2>
  <p class="descricao">
    Estamos aqui para ajudar! Preencha o formulário abaixo e entraremos em contato com você o mais breve possível.
  </p>

  <form>
    <div class="form-group">
      <label>Primeiro Nome</label>
      <input type="text" placeholder="Seu nome...">
    </div>

    <div class="form-group">
      <label>Último Nome</label>
      <input type="text" placeholder="Seu sobrenome...">
    </div>

    <div class="form-group">
      <label>E-mail</label>
      <input type="email" placeholder="Seu e-mail...">
    </div>

    <div class="form-group">
      <label>País</label>
      <select>
        <option>Selecione</option>
        <option>Brasil</option>
        <option>Portugal</option>
        <option>Outros</option>
      </select>
    </div>

    <div class="form-group">
      <label>Assunto</label>
      <textarea placeholder="Escreva aqui..."></textarea>
    </div>

    <div class="botoes">
      <button type="reset" class="limpar">Limpar</button>
      <button type="submit" class="enviar">Enviar</button>
    </div>
  </form>

  <p class="rodape">
    Em caso de dúvidas entre em contato 📞
  </p>
</div>

</body>
</html>
