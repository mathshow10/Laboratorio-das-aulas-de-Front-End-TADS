<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

  <div class="container">
    <h1>Faça seu cadastro!</h1>
    <p class="subtitulo">Compre online &#9658;
      <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png" alt="Usuário" class="icon-user">
      <img src="https://cdn-icons-png.flaticon.com/512/1946/1946392.png" alt="Adicionar usuário" class="icon-user">
    </p>

    <form>
      <!-- Dados Pessoais -->
      <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email">

        <label for="nascimento">Data de Nascimento</label>
        <input type="date" id="nascimento" name="nascimento">

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
      </fieldset>

      <!-- Endereço -->
      <fieldset>
        <legend>Endereço</legend>

        <label for="rua">Rua</label>
        <input type="text" id="rua" name="rua">

        <label for="numero">Número</label>
        <input type="number" id="numero" name="numero" min="1">

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro">

        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" placeholder="00000-000">

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" name="cidade">

        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="">Selecione um estado</option>
          <option value="AC">Acre</option>
          <option value="AL">Alagoas</option>
          <option value="AP">Amapá</option>
          <option value="AM">Amazonas</option>
          <option value="BA">Bahia</option>
          <option value="CE">Ceará</option>
          <option value="DF">Distrito Federal</option>
          <option value="ES">Espírito Santo</option>
          <option value="GO">Goiás</option>
          <option value="MA">Maranhão</option>
          <option value="MT">Mato Grosso</option>
          <option value="MS">Mato Grosso do Sul</option>
          <option value="MG">Minas Gerais</option>
          <option value="PA">Pará</option>
          <option value="PB">Paraíba</option>
          <option value="PR">Paraná</option>
          <option value="PE">Pernambuco</option>
          <option value="PI">Piauí</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="RN">Rio Grande do Norte</option>
          <option value="RS">Rio Grande do Sul</option>
          <option value="RO">Rondônia</option>
          <option value="RR">Roraima</option>
          <option value="SC">Santa Catarina</option>
          <option value="SP">São Paulo</option>
          <option value="SE">Sergipe</option>
          <option value="TO">Tocantins</option>
        </select>
      </fieldset>

      <!-- Login -->
      <fieldset>
        <legend>Login</legend>

        <label for="imagem">Imagem de perfil</label>
        <input type="file" id="imagem" name="imagem">

        <label for="login">Login</label>
        <input type="text" id="login" name="login">

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha">

        <label for="confirma-senha">Confirmação de Senha</label>
        <input type="password" id="confirma-senha" name="confirma-senha">
      </fieldset>

      <!-- Botões -->
      <div class="botoes">
        <button type="reset" class="btn-cancelar">Cancelar</button>
        <button type="submit" class="btn-enviar">Enviar</button>
      </div>
    </form>
  </div>

</body>
</html>
